<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Add some fractal noise to make the edges jagged and realistic like a brush -->
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <g filter="url(#rough)" fill="black" stroke="black" stroke-linecap="round" stroke-linejoin="round">
    <!-- Core block to ensure the middle is solid -->
    <rect x="150" y="150" width="500" height="500" rx="30" />
    
    <!-- Multiple thick diagonal strokes spanning across -->
    <line x1="100" y1="180" x2="650" y2="100" stroke-width="120" />
    <line x1="80" y1="300" x2="720" y2="200" stroke-width="160" />
    <line x1="50" y1="450" x2="750" y2="350" stroke-width="180" />
    <line x1="70" y1="580" x2="700" y2="480" stroke-width="150" />
    <line x1="150" y1="700" x2="650" y2="600" stroke-width="130" />

    <!-- Extra edge strokes for that "splatter/bristle" look -->
    <!-- Top Left -->
    <line x1="80" y1="120" x2="200" y2="150" stroke-width="50" />
    <line x1="120" y1="80" x2="250" y2="120" stroke-width="40" />
    
    <!-- Top Right -->
    <line x1="600" y1="80" x2="720" y2="120" stroke-width="60" />
    <line x1="650" y1="140" x2="760" y2="180" stroke-width="70" />
    
    <!-- Right side -->
    <line x1="720" y1="280" x2="780" y2="300" stroke-width="50" />
    <line x1="740" y1="400" x2="790" y2="420" stroke-width="60" />
    <line x1="700" y1="550" x2="770" y2="570" stroke-width="45" />

    <!-- Bottom Right -->
    <line x1="650" y1="650" x2="720" y2="700" stroke-width="70" />
    <line x1="550" y1="680" x2="620" y2="730" stroke-width="50" />

    <!-- Bottom Left -->
    <line x1="250" y1="680" x2="180" y2="730" stroke-width="50" />
    <line x1="150" y1="620" x2="80" y2="680" stroke-width="65" />

    <!-- Left side -->
    <line x1="100" y1="520" x2="30" y2="550" stroke-width="55" />
    <line x1="80" y1="380" x2="20" y2="400" stroke-width="60" />
    <line x1="120" y1="250" x2="50" y2="280" stroke-width="45" />
  </g>
</svg>
